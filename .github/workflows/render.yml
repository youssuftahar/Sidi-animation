name: Render Video 
on: [push] 
jobs: 
  render: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - uses: actions/setup-node@v4 
        with: 
          node-version: 18 
      - run: npm install 
      - run: npx @remotion/cli render PremiumProductShowcase src/index.js output.mp4 
      - uses: actions/upload-artifact@v4 
        with: 
          name: iPhone17_4K_Video 
          path: output.mp4
